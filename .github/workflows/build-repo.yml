name: Build & Deploy APT Repository

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to use (default: latest)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REPO_CODENAME: trixie
  REPO_COMPONENT: main
  REPO_ORIGIN: Astroberry Alt
  REPO_LABEL: Astroberry Alt Repository
  REPO_SUITE: stable
  MUTABLE_RELEASE_TAG: trixie

jobs:
  repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure apt for quiet mode
        run: |
          sudo tee /etc/apt/apt.conf.d/99opencode-quiet > /dev/null <<'EOF'
          APT::Get::Quiet "2";
          Dpkg::Progress-Fancy "0";
          quiet "true";
          EOF

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev jq

      - name: Determine release tag
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            echo "No tag specified, finding latest release..."
            TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
              jq -r '.tag_name // empty')
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "::error::No releases found!"
              exit 1
            fi
          fi
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "Using versioned release: $TAG"

      - name: Download .deb from versioned Release
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          API="https://api.github.com/repos/${{ github.repository }}"
          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"

          mkdir -p repo/pool/main

          echo "Fetching assets for $TAG..."
          curl -s -H "Authorization: token $TOKEN" \
            "$API/releases/tags/$TAG" | jq -r '.assets[]? | .name' > /tmp/all_assets.txt

          # Filter out dbg and dbgsym packages
          grep -vE '(-dbg|-dbgsym)_' /tmp/all_assets.txt > /tmp/release_assets.txt

          COUNT=$(wc -l < /tmp/release_assets.txt)
          echo "Found $COUNT packages (filtered out dbg/dbgsym)"
          export DOWNLOAD_BASE
          xargs -P 4 -I {} -a /tmp/release_assets.txt \
            sh -c 'curl -s -L -o "repo/pool/main/{}" "$DOWNLOAD_BASE/{}"'

          echo "Downloaded $COUNT packages"
          echo "Total pool size: $(du -sh repo/pool/main | cut -f1)"

      - name: Generate repository indices
        run: |
          mkdir -p repo/dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64
          mkdir -p repo/dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64

          cd repo

          # Generate Packages for arm64
          dpkg-scanpackages --arch=arm64 pool/main /dev/null \
            > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Packages
          gzip -9c dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Packages \
            > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Packages.gz
          echo "${REPO_COMPONENT}" > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Components

          # Generate Packages for amd64
          dpkg-scanpackages --arch=amd64 pool/main /dev/null \
            > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Packages
          gzip -9c dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Packages \
            > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Packages.gz
          echo "${REPO_COMPONENT}" > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Components

      - name: Generate Release file
        run: |
          cd repo/dists/${REPO_CODENAME}
          {
            echo "Origin: ${REPO_ORIGIN}"
            echo "Label: ${REPO_LABEL}"
            echo "Suite: ${REPO_SUITE}"
            echo "Codename: ${REPO_CODENAME}"
            echo "Version: 1.0"
            echo "Architectures: arm64 amd64"
            echo "Components: ${REPO_COMPONENT}"
            echo "Description: Astroberry Alt INDI repository for ${REPO_CODENAME}"
            echo "Date: $(date -Ru)"
            echo ""
            echo "MD5Sum:"
            find ${REPO_COMPONENT} -type f \( -name "Packages*" -o -name "Components" \) | while read f; do
              echo " $(md5sum "$f" | cut -d' ' -f1) $(stat -c%s "$f") $f"
            done
            echo "SHA256:"
            find ${REPO_COMPONENT} -type f \( -name "Packages*" -o -name "Components" \) | while read f; do
              echo " $(sha256sum "$f" | cut -d' ' -f1) $(stat -c%s "$f") $f"
            done
          } > Release

      - name: Upload to mutable Release "trixie"
        run: |
          TAG="${{ env.MUTABLE_RELEASE_TAG }}"
          API="https://api.github.com/repos/${{ github.repository }}"
          UPLOAD="https://uploads.github.com/repos/${{ github.repository }}/releases"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"

          # Create or update mutable release
          EXISTING=$(curl -s -H "Authorization: token $TOKEN" "$API/releases/tags/$TAG")
          RELEASE_ID=$(echo "$EXISTING" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "Creating mutable release $TAG..."
            BODY=$(printf 'Mutable APT repository for trixie.\n\nBase URL for sources.list:\n```\ndeb [trusted=yes] https://github.com/${{ github.repository }}/releases/download/trixie/ trixie main\n```')
            PAYLOAD=$(jq -n \
              --arg tag "$TAG" \
              --arg name "APT Repository (mutable)" \
              --arg body "$BODY" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')
            CREATE=$(curl -s -X POST -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" "$API/releases")
            RELEASE_ID=$(echo "$CREATE" | jq -r '.id // empty')
          else
            echo "Updating mutable release $TAG (ID: $RELEASE_ID)..."
            # Delete ALL existing assets
            echo "$EXISTING" | jq -r '.assets[].id' | while read asset_id; do
              [ -n "$asset_id" ] && curl -s -X DELETE -H "Authorization: token $TOKEN" \
                "$API/releases/assets/$asset_id"
            done
          fi

          UPLOAD_URL="https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets"

          # Upload dists/ structure
          echo "Uploading dists/ assets..."
          find repo/dists -type f | while IFS= read -r file; do
            # Asset name with path preserved
            ASSET_NAME="${file#repo/}"
            echo "  Uploading: $ASSET_NAME"
            curl -s -X POST -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/octet-stream" \
              "$UPLOAD_URL?name=$ASSET_NAME" --data-binary @"$file" > /dev/null
          done

          # Upload pool/main packages
          echo "Uploading pool/ assets..."
          find repo/pool/main -type f -name "*.deb" | while IFS= read -r file; do
            ASSET_NAME="${file#repo/}"
            echo "  Uploading: $ASSET_NAME"
            curl -s -X POST -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/octet-stream" \
              "$UPLOAD_URL?name=$ASSET_NAME" --data-binary @"$file" > /dev/null
          done

          echo "Done. Repository available at:"
          echo "  deb [trusted=yes] https://github.com/${{ github.repository }}/releases/download/trixie/ trixie main"
