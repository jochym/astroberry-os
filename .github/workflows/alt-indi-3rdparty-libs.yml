name: Build Libs Separately
on:
  workflow_dispatch:

jobs:
  build-libs:
    runs-on: ubuntu-24.04-arm
    container: debian:trixie-slim
    steps:
      - name: Install git and dependencies
        run: |
          apt-get update
          apt-get install -q -y git ca-certificates build-essential dpkg-dev git ca-certificates
      - name: Get INDI Sources
        uses: actions/checkout@v6
        with:
          repository: 'indilib/indi-3rdparty'
          ref: refs/tags/v2.2.2.1
          path: '3rdparty'

      - name: Download Artifact from Core Workflow
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
          # Nazwa głównego potoku (wartość z pola 'name:' w pliku core)
          workflow: alt-indi-core.yml
          
          # Nazwa artefaktu podana przy uploadzie
          name: indi-compiled-packages
          
          # Pobierz tylko jeśli potok źródłowy zakończył się sukcesem
          workflow_conclusion: success
          
          # Ścieżka docelowa dla plików .deb
          path: ./pre-built-core


      - name: Install Core and Build Libs
        run: |
          apt-get install -y ./pre-built-core/build/*.deb
          cd 3rdparty
          for drv in indi-* ; do
            apt-get build-dep -y debian/$drv/control
          done
            
