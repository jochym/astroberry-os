name: Build 3rd Party Libs and Drivers
on:
  workflow_dispatch:

jobs:
  build-libs:
    runs-on: ubuntu-24.04-arm
    container: debian:trixie-slim
    steps:
      - name: Install git and dependencies
        run: |
          apt-get update
          apt-get install -q -y git ca-certificates build-essential dpkg-dev

      - name: Get INDI Sources
        uses: actions/checkout@v6
        with:
          repository: 'indilib/indi-3rdparty'
          ref: refs/tags/v2.2.2.1
          path: '3rdparty'

      - name: Download Artifact from Core Workflow
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: alt-indi-core.yml
          name: indi-compiled-packages
          workflow_conclusion: success
          path: ./pre-built-core

      - name: Install Core Packages
        run: |
          apt-get install -y ./pre-built-core/*.deb

      - name: Categorize, Resolve and Build Drivers
        run: |
          cd 3rdparty
          
          # Initialize the error report file
          REPORT_FILE="failed_builds_report.md"
          echo "# INDI Build Failure Report" > $REPORT_FILE
          echo "Generated on: $(date)" >> $REPORT_FILE
          echo -e "\n| Component Type | Component Name | Failure Reason |" >> $REPORT_FILE
          echo "| --- | --- | --- |" >> $REPORT_FILE

          LIBS_SRC_DIR="./"

          for driver in indi-* ; do
            control_file=debian/$driver/control
            [ -e "$control_file" ] || continue
            
            DRIVER_NAME=$driver
            echo "========================================================="
            echo "Analyzing driver: $DRIVER_NAME"
            echo "========================================================="
            
            # Fetch the raw list of unmet dependencies
            RAW_DEPS=$(dpkg-checkbuilddeps "$control_file" 2>&1 | \
                        sed -E 's/^.*unmet build dependencies:\s*//Ii' | \
                        sed -e 's/([^)]*)//g' -e 's/,//g')
            
            if [ -z "$RAW_DEPS" ]; then
              echo "No missing dependencies for $DRIVER_NAME."
              continue
            fi

            # POSIX-compliant error handling for dpkg tool failures
            case "$RAW_DEPS" in
              *błąd*|*error*|*Error*|*Błąd*)
                echo "::error:: Critical dpkg-checkbuilddeps error for $DRIVER_NAME: $RAW_DEPS"
                echo "| Driver | $DRIVER_NAME | Corrupted control file or dpkg error |" >> $REPORT_FILE
                continue
                ;;
            esac
            
            DEBS_TO_INSTALL=""
            LIBS_TO_BUILD=""
            FATAL_ERROR=0
            MISSING_FATAL_PACKAGES=""

            # Categorize each missing dependency
            for package in $RAW_DEPS; do
              # Category 1: Package exists in official Debian repositories
              if apt-cache policy "$package" | grep -q "Candidate: [^ ]"; then
                DEBS_TO_INSTALL="$DEBS_TO_INSTALL $package"
                
              # Category 2: Package matches a local source directory
              elif [ -d "${LIBS_SRC_DIR}/${package}" ]; then
                LIBS_TO_BUILD="$LIBS_TO_BUILD $package"
                
              # Category 3: Package is completely missing (Fatal for this driver)
              else
                FATAL_ERROR=1
                MISSING_FATAL_PACKAGES="$MISSING_FATAL_PACKAGES $package"
              fi
            done

            # Handle Category 3 errors
            if [ "$FATAL_ERROR" -eq 1 ]; then
              echo "::error:: Cannot build driver [$DRIVER_NAME]! Missing ghost packages: $MISSING_FATAL_PACKAGES"
              echo "| Driver | $DRIVER_NAME | Missing dependencies (not in Debian, no local source): $MISSING_FATAL_PACKAGES |" >> $REPORT_FILE
              echo "Skipping driver [$DRIVER_NAME] due to unmet dependencies."
              continue
            fi

            # Handle Category 2: Compile local dependencies
            if [ ! -z "$LIBS_TO_BUILD" ]; then
              echo "Local libraries detected to build for $DRIVER_NAME: $LIBS_TO_BUILD"
              
              LIB_BUILD_FAILED=0

              for lib in $LIBS_TO_BUILD; do
                echo "-> Building and installing local library: $lib"
                
                if ./scripts/indi-3rdparty-deb.sh "$lib"; then                  
                  if ! apt-get install -y ./build/"$lib"*.deb; then
                    echo "::error:: Failed to install compiled package for library [$lib]"
                    echo "| Library | $lib (dep of $DRIVER_NAME) | Installation of compiled .deb package failed |" >> $REPORT_FILE
                    LIB_BUILD_FAILED=1
                    break
                  fi
                else
                  echo "::error:: Compilation of library [$lib] failed."
                  echo "| Library | $lib (dep of $DRIVER_NAME) | 3rdparty build script execution failed |" >> $REPORT_FILE
                  LIB_BUILD_FAILED=1
                  break
                fi
              done

              if [ "$LIB_BUILD_FAILED" -eq 1 ]; then
                echo "::error:: Skipping driver [$DRIVER_NAME] due to local dependency build failure."
                continue
              fi
            fi            

            # Handle Category 1: Install system packages
            if [ ! -z "$DEBS_TO_INSTALL" ]; then
              echo "Installing packages from Debian repository for $DRIVER_NAME: $DEBS_TO_INSTALL"
              apt-get install -y $DEBS_TO_INSTALL
            fi

            echo "Dependencies for $DRIVER_NAME successfully resolved. Proceeding to compilation."
            echo "Starting build process for driver: $DRIVER_NAME"
            
            # Execute driver compilation within a safe conditional block
            if ./scripts/indi-3rdparty-deb.sh "$DRIVER_NAME"; then
              echo "::notice:: Success: Driver $DRIVER_NAME built successfully."
            else
              echo "::error:: Compilation error: Building driver [$DRIVER_NAME] failed!"
              echo "| Driver | $DRIVER_NAME | Driver compilation script returned non-zero exit code |" >> $REPORT_FILE
              echo "Skipping error and moving to the next driver."
              continue
            fi

            echo "Procedure completed for: $DRIVER_NAME"
          done

      - name: Upload Compiled Debian Packages
        uses: actions/upload-artifact@v4
        with:
          name: 3rdparty-compiled-packages
          path: |
            3rdparty/build/*.deb
          retention-days: 14
          if-no-files-found: error

      - name: Upload Failed Builds Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failed-components-report
          path: 3rdparty/failed_builds_report.md
          retention-days: 30
