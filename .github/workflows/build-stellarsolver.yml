name: stellarsolver

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, "${{ matrix.architecture }}"]

    strategy:
      fail-fast: false
      matrix:
        distro: ["debian-trixie"]
        architecture: ["arm64", "amd64"]

    container:
      image: ghcr.io/${{ github.repository }}/${{ matrix.distro }}-${{ matrix.architecture }}

    steps:
      - name: Get StellarSolver Sources
        uses: actions/checkout@v6
        with:
          repository: 'rlancaste/stellarsolver'
          # ref: refs/tags/2.7
          path: 'stellarsolver'

      - name: Build StellarSolver Packages
        run: |
          rm -rf build/deb_stellarsolver && mkdir -p build/deb_stellarsolver && \
          cp -r stellarsolver/* build/deb_stellarsolver/ && \
          cd build/deb_stellarsolver && \
          sed -i "s/(2.7)/(2.7-1)/g" debian/changelog && \
          sed -i "s/-DUSE_QT5=OFF/-DUSE_QT5=OFF -DBUILD_TESTER=ON/g" debian/rules && \
          echo "export DEB_BUILD_OPTIONS := parallel=\$(shell nproc)" >> debian/rules && \
          echo "usr/bin/*" >> debian/libstellarsolver.install && \
          echo "usr/share/applications/*" >> debian/libstellarsolver.install && \
          echo "usr/share/icons/*" >> debian/libstellarsolver.install && \
          fakeroot debian/rules binary
