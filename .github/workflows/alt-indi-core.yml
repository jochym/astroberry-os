name: Build core INDI Libs and Drivers

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DEBIAN_FRONTEND: noninteractive
  APT_LISTCHANGES_FRONTEND: none
  DH_VERBOSE: '0'
  DEB_BUILD_OPTIONS: 'quiet'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}

    container:
      image: debian:trixie-slim

    steps:
      - name: Install build tools
        run: |
          apt-get update -qq
          apt-get install -qq -y git ca-certificates curl jq build-essential dpkg-dev

      - name: Detect upstream release version
        run: |
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/indilib/indi/releases/latest | jq -r .tag_name)
          VERSION=$(echo "$UPSTREAM_TAG" | sed 's/^v//')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to fetch version from GitHub API. Using default version: 2.2.2"
            VERSION="2.2.2"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Detected package version: $VERSION"
      
      - name: Checkout INDI sources
        uses: actions/checkout@v6
        with:
          repository: 'indilib/indi'
          ref: refs/tags/v${{ env.VERSION }}
          path: 'indi'

      - name: Install build dependencies
        run: |
          apt-get build-dep -qqy ./indi

      - name: Build INDI core packages
        run: |
          indi/scripts/indi-core-deb.sh 2>&1 | tail -20

      - name: Upload compiled packages (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: indi-compiled-packages-${{ matrix.arch }}
          path: |
            *.deb
            **/*.deb
          retention-days: 14
          if-no-files-found: error