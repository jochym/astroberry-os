name: Publish Debian Repository

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build 3rd Party Libs and Drivers"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DEBIAN_FRONTEND: noninteractive
  DEBCONF_FRONTEND: noninteractive
  REPO_CODENAME: trixie
  REPO_COMPONENT: main
  REPO_ORIGIN: Astroberry Alt
  REPO_LABEL: Astroberry Alt Repository
  REPO_SUITE: stable

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Configure apt for quiet mode
        run: |
          sudo tee /etc/apt/apt.conf.d/99opencode-quiet > /dev/null <<'EOF'
          APT::Get::Quiet "2";
          Dpkg::Progress-Fancy "0";
          quiet "true";
          EOF

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev dpkg-scanpackages gnupg

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --export-secret-keys > /dev/null

      - name: Download core packages (arm64)
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: alt-indi-core.yml
          name: indi-compiled-packages-arm64
          workflow_conclusion: success
          path: ./artifacts/core-arm64

      - name: Download core packages (amd64)
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: alt-indi-core.yml
          name: indi-compiled-packages-amd64
          workflow_conclusion: success
          path: ./artifacts/core-amd64

      - name: Download 3rdparty packages (arm64)
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: alt-indi-3rdparty.yml
          name: 3rdparty-compiled-packages-arm64
          workflow_conclusion: success
          path: ./artifacts/3rdparty-arm64

      - name: Download 3rdparty packages (amd64)
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: alt-indi-3rdparty.yml
          name: 3rdparty-compiled-packages-amd64
          workflow_conclusion: success
          path: ./artifacts/3rdparty-amd64

      - name: Download meta-package (arm64)
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: indi-3rdparty-meta.yml
          name: indi-3rdparty-meta-package-arm64
          workflow_conclusion: success
          path: ./artifacts/meta-arm64

      - name: Download meta-package (amd64)
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: indi-3rdparty-meta.yml
          name: indi-3rdparty-meta-package-amd64
          workflow_conclusion: success
          path: ./artifacts/meta-amd64

      - name: Prepare repository structure
        run: |
          mkdir -p repo/pool/main
          mkdir -p repo/dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64
          mkdir -p repo/dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64

      - name: Copy all packages to pool
        run: |
          find ./artifacts -name "*.deb" -exec cp {} repo/pool/main/ \;
          echo "Total packages: $(find repo/pool/main -name '*.deb' | wc -l)"

      - name: Generate Packages for arm64
        run: |
          cd repo
          dpkg-scanpackages --arch=arm64 pool/main /dev/null > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Packages
          gzip -9c dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Packages > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Packages.gz

      - name: Generate Packages for amd64
        run: |
          cd repo
          dpkg-scanpackages --arch=amd64 pool/main /dev/null > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Packages
          gzip -9c dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Packages > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Packages.gz

      - name: Generate and sign Release file
        run: |
          cd repo/dists/${REPO_CODENAME}
          {
            echo "Origin: ${REPO_ORIGIN}"
            echo "Label: ${REPO_LABEL}"
            echo "Suite: ${REPO_SUITE}"
            echo "Codename: ${REPO_CODENAME}"
            echo "Version: 1.0"
            echo "Architectures: arm64 amd64"
            echo "Components: ${REPO_COMPONENT}"
            echo "Description: Astroberry Alt INDI repository for ${REPO_CODENAME}"
            echo "Date: $(date -Ru)"
            echo ""
            echo "MD5Sum:"
            find ${REPO_COMPONENT} -type f -name "Packages*" -exec md5sum {} \; | awk '{print " " $1 " " $2 " " $3}'
            echo "SHA256:"
            find ${REPO_COMPONENT} -type f -name "Packages*" -exec sha256sum {} \; | awk '{print " " $1 " " $2 " " $3}'
          } > Release

          gpg --batch --yes --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --pinentry-mode loopback \
              --detach-sign --armor \
              -o Release.gpg Release

      - name: Verify repository structure
        run: |
          find repo -type f | sort

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          destination_dir: .
          keep_files: true